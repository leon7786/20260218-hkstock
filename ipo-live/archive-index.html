<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IPO 建档索引（本地实时读取 archive-index.json）</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;background:#0f172a;color:#e2e8f0;margin:0;padding:16px}.wrap{max-width:1400px;margin:0 auto}.meta{color:#94a3b8;margin-bottom:10px}table{width:100%;border-collapse:collapse;background:#0b1222}th,td{border-bottom:1px solid #1e293b;padding:8px 10px;text-align:left;font-size:13px;white-space:nowrap}th{background:#111b33}.ok{color:#34d399}.pending{color:#fbbf24}</style></head><body><div class="wrap"><h1>IPO 建档索引（本地实时读取 archive-index.json）</h1><div class="meta">本地页面：以建档数据为单一来源｜总数：<span id="count">加载中</span></div><table><thead><tr><th>代码</th><th>状态</th><th>口径日期</th><th>发售价</th><th>公开募资</th><th>国际发售</th><th>全球募资</th><th>中签率</th></tr></thead><tbody id="tbody"></tbody></table></div><script>
fetch('./archive-index.json').then(r=>r.json()).then(d=>{
  document.getElementById('count').textContent = d.total;
  const rows = d.rows || [];
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map(r=>{
    const fmtHkd = n => Number.isFinite(n) ? (n>=1e8? (n/1e8).toFixed(1)+' 亿港元' : n>=1e4? (n/1e4).toFixed(1)+' 万港元' : n.toFixed(1)+' 港元') : '待定';
    const fmtPct = n => Number.isFinite(n) ? n.toFixed(1)+'%' : '待定';
    const pub = Number.isFinite(r.publicGrossHkd) && Number.isFinite(r.publicPct) ? fmtPct(r.publicPct)+'：'+fmtHkd(r.publicGrossHkd) : '待定';
    const intl = Number.isFinite(r.internationalGrossHkd) && Number.isFinite(r.internationalPct) ? fmtPct(r.internationalPct)+'：'+fmtHkd(r.internationalGrossHkd) : '待定';
    return '<tr><td>'+r.code+'</td><td>'+r.status+'</td><td>'+ (r.sourceOfTruthDate||'待定') +'</td><td>'+ (Number.isFinite(r.offerPriceHkd)? r.offerPriceHkd.toFixed(2):'待定') +'</td><td>'+pub+'</td><td>'+intl+'</td><td>'+(Number.isFinite(r.globalGrossHkd)?fmtHkd(r.globalGrossHkd):'待定')+'</td><td>'+(Number.isFinite(r.allotmentRatePct)?fmtPct(r.allotmentRatePct):'待定')+'</td></tr>';
  }).join('');
});
</script></body></html>
